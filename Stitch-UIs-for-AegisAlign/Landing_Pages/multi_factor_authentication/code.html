<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .security-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(17, 82, 212, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden security-grid">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center p-2 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl">shield_lock</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">AEGIS Protocol</h2>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 text-emerald-500 border border-emerald-500/20">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-xs font-bold uppercase tracking-wider">Security Status: Encrypted</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="layout-content-container flex flex-col max-w-[480px] w-full gap-6">
<!-- Verification Card -->
<div class="flex flex-col rounded-xl overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 backdrop-blur-sm">
<!-- Card Image/Visual Header -->
<div class="relative h-48 w-full bg-slate-100 dark:bg-slate-800">
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 via-transparent to-primary/10"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="p-6 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-6xl text-primary">vibration</span>
</div>
</div>
<div class="absolute bottom-4 left-4 right-4 text-center">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Secure Verification</h1>
</div>
</div>
<!-- Card Body -->
<div class="p-8 flex flex-col gap-6">
<div class="text-center space-y-2">
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                                    Enter the 6-digit code from your <span class="text-primary font-medium">AEGIS Authenticator</span> app to authorize this session.
                                </p>
</div>
<!-- OTP Inputs -->
<div class="flex justify-between gap-2 md:gap-3 py-4">
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white" maxlength="1" type="text"/>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold text-base transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">key</span>
                                Verify Identity
                            </button>
</div>
</div>
<!-- Secondary Options -->
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-2 w-full h-11 px-4 rounded-lg bg-slate-200/50 dark:bg-slate-800/50 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold transition-colors border border-slate-300/20 dark:border-slate-700/30">
<span class="material-symbols-outlined text-lg">sms</span>
                            Send SMS Code instead
                        </button>
<button class="flex items-center justify-center gap-2 w-full h-11 px-4 rounded-lg bg-slate-200/50 dark:bg-slate-800/50 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold transition-colors border border-slate-300/20 dark:border-slate-700/30">
<span class="material-symbols-outlined text-lg">restore</span>
                            Use Backup Recovery Key
                        </button>
</div>
<!-- Footer -->
<div class="text-center pt-4">
<p class="text-xs text-slate-500 dark:text-slate-600">
                            Managed by AEGIS Protocol. All connections are end-to-end encrypted.
                        </p>
</div>
</div>
</main>
</div>
</div>
</body></html>
